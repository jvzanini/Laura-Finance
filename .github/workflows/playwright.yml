name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: laura-pwa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: laura-pwa/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      # NOTE: Playwright executa apenas --list (parse validation) no CI MVP.
      # Execucao completa requer stack full (Postgres + Go API + PWA up) — Fase 12+.
      - name: List Playwright tests (parse validation only)
        env:
          SKIP_E2E_AUTH: '1'
        run: npx playwright test --list
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: laura-pwa/playwright-report/
          retention-days: 30
