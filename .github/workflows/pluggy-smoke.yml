name: pluggy-smoke
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Pluggy environment'
        required: true
        default: 'sandbox'
        type: choice
        options:
          - sandbox
          - production
jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      PLUGGY_CLIENT_ID: ${{ secrets.PLUGGY_CLIENT_ID }}
      PLUGGY_CLIENT_SECRET: ${{ secrets.PLUGGY_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: laura-go/go.sum
      - name: Run smoke test
        working-directory: laura-go
        run: |
          # Smoke test manual — confirma Pluggy auth + connect_token
          go test -tags=smoke -run TestPluggy_SmokeAuthConnectFlow -v ./internal/pluggy/
