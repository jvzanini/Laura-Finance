version: "2"

# Fase 17A — errcheck + revive ativados. Staticcheck supressões
# serão reduzidas em Sprint E.

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - revive
    - staticcheck
  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
      exclude-functions:
        - (io.Closer).Close
        - os.Setenv
        - os.Unsetenv
    revive:
      severity: error
      confidence: 0.8
      rules:
        - name: error-strings
        - name: error-naming
        - name: error-return
        - name: errorf
        - name: if-return
        - name: var-declaration
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: increment-decrement
        - name: range
        - name: superfluous-else
        - name: unreachable-code
    staticcheck:
      checks:
        - "all"
        - "-ST1000"
        - "-ST1003"
        - "-ST1005"
        - "-ST1020"
        - "-ST1021"
        - "-ST1022"
        - "-SA1012"
        - "-SA1019"
        - "-SA9003"
        - "-QF1003"
        - "-QF1007"
        - "-QF1008"
        - "-S1025"
        - "-S1039"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
