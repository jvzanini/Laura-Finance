name: bank-sync

on:
  schedule:
    - cron: "0 5 * * *" # diário 05:00 UTC = 02:00 BRT
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger sync endpoint
        run: |
          set -eo pipefail
          echo "Triggering bank-sync at $(date -u +%FT%TZ)"
          http_code=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            -X POST https://laura-finance-api.fly.dev/api/v1/banking/sync \
            -H "X-Ops-Token: ${{ secrets.BACKUP_OPS_TOKEN }}" \
            -H "Content-Type: application/json" \
            --max-time 120) || http_code=000
          echo "HTTP $http_code"
          cat /tmp/resp.json || true
          echo ""
          # STANDBY: até PLUGGY configurado, endpoint retorna 200 'disabled' ou 'stub'.
          # Workflow é informativo; não falha por retorno != 200 para permitir rollout.
          if [ "$http_code" = "000" ]; then
            echo "::warning::bank-sync timeout ou rede indisponível"
          fi
