app = "laura-finance-api"
primary_region = "gru"
kill_signal = "SIGTERM"
kill_timeout = 30

[build]
  dockerfile = "laura-go/Dockerfile"
  [build.args]
    BUILD_SHA = "${GITHUB_SHA:-dev}"
    BUILD_TIME = "${BUILD_TIME:-unknown}"

[env]
  PORT = "8080"
  MIGRATE_ON_BOOT = "true"
  LOG_LEVEL = "info"
  ENVIRONMENT = "production"
  TZ = "America/Sao_Paulo"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "15s"
    method = "GET"
    path = "/health"

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/ready"

# Single-machine: cron in-process. Ver spec v3 5.10.
# Pos-deploy: fly scale count 1 -a laura-finance-api.

[metrics]
  port = 9090
  path = "/metrics"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
