version: "2"

# Fase 17A — config destravada (supressões 14 -> 6).
# ADR 001 encerrado, ADR 004 (whatsmeow proto), ADR 005 (revive profile).

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - revive
    - staticcheck
  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
      exclude-functions:
        - (io.Closer).Close
        - os.Setenv
        - os.Unsetenv
    revive:
      severity: error
      confidence: 0.8
      rules:
        - name: error-strings
        - name: error-naming
        - name: error-return
        - name: errorf
        - name: if-return
        - name: var-declaration
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: increment-decrement
        - name: range
        - name: superfluous-else
        - name: unreachable-code
    staticcheck:
      checks:
        - "all"
        # ADR 005 — godoc/naming não exigidos:
        - "-ST1000"  # package godoc
        - "-ST1003"  # naming (PT-BR acronyms) - reavaliar 17B
        - "-ST1020"  # godoc exported
        - "-ST1021"  # godoc type
        - "-ST1022"  # godoc var
        # Estilística caso-a-caso:
        - "-QF1008"  # embedded fields - legibilidade subjetiva

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
