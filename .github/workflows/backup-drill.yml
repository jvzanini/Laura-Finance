name: backup-drill
on:
  schedule:
    - cron: "0 4 */14 * *"
  workflow_dispatch:
concurrency:
  group: drill
  cancel-in-progress: false
jobs:
  drill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_BACKUP }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
