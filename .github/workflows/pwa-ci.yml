name: PWA CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: laura-pwa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: laura-pwa/package-lock.json
      - run: npm ci
      - name: TypeScript typecheck
        run: npx tsc --noEmit

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: laura-pwa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: laura-pwa/package-lock.json
      - run: npm ci
      - run: npm run lint

  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: laura-pwa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: laura-pwa/package-lock.json
      - run: npm ci
      - name: Next build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          STRIPE_SECRET_KEY: sk_test_dummy_for_build_only_not_used
          STRIPE_WEBHOOK_SECRET: whsec_dummy_for_build_only
          RESEND_API_KEY: re_dummy_for_build_only
          DATABASE_URL: postgres://dummy:dummy@localhost:5432/dummy?sslmode=disable
          SESSION_SECRET: dummy_session_secret_only_for_build_32bytes_padding_xx
          POSTGRES_USER: dummy_user
          POSTGRES_PASSWORD: dummy_pass
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_DB: dummy_db
          NODE_ENV: production
          # Marca o build como CI para skipar validacoes de runtime que
          # so fazem sentido em prod real (lib stripe, db connect at boot, etc).
          CI: "true"

  vitest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: laura-pwa
    steps:
      - uses: actions/checkout@v4
      - name: Detect vitest config
        id: detect
        run: |
          if ls vitest.config.* >/dev/null 2>&1; then
            echo "has_vitest=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_vitest=false" >> "$GITHUB_OUTPUT"
            echo "No vitest config found — skipping."
          fi
      - uses: actions/setup-node@v4
        if: steps.detect.outputs.has_vitest == 'true'
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: laura-pwa/package-lock.json
      - name: Install deps
        if: steps.detect.outputs.has_vitest == 'true'
        run: npm ci
      - name: Run vitest
        if: steps.detect.outputs.has_vitest == 'true'
        run: npx vitest run
