# STANDBY [FLY-AUTH] — falha ate FLY_API_TOKEN estar no GH Secrets.
name: deploy-api
on:
  push:
    branches: [main, master]
    paths:
      - 'laura-go/**'
      - 'infrastructure/migrations/**'
      - 'laura-go/fly.toml'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:
jobs:
  deploy:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    concurrency: deploy-api
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Fly deploy
        run: flyctl deploy --remote-only --config laura-go/fly.toml --dockerfile laura-go/Dockerfile
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        with:
          payload: |
            {"text": "deploy-api ${{ job.status }} — commit ${{ github.sha }}"}
