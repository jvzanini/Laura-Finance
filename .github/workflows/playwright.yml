name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: laura-pwa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: laura-pwa/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Start stack (postgres/redis/api-go/pwa)
        working-directory: ${{ github.workspace }}
        run: docker compose -f docker-compose.ci.yml up -d --wait --build
      - name: Run seed (one-shot)
        working-directory: ${{ github.workspace }}
        run: docker compose -f docker-compose.ci.yml --profile seed run --rm seed-e2e
      - name: Run Playwright tests
        env:
          CI: "1"
          BASE_URL: http://localhost:3000
          API_URL: http://localhost:8080
        run: npx playwright test
      - name: Debug — logs dos containers (on failure)
        if: failure()
        working-directory: ${{ github.workspace }}
        run: |
          echo "=== PS ===" && docker compose -f docker-compose.ci.yml ps
          echo "=== api-go logs ===" && docker compose -f docker-compose.ci.yml logs api-go | tail -80
          echo "=== pwa logs ===" && docker compose -f docker-compose.ci.yml logs pwa | tail -40
          echo "=== postgres logs ===" && docker compose -f docker-compose.ci.yml logs postgres | tail -30
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            laura-pwa/playwright-report/
            laura-pwa/results.xml
            laura-pwa/test-results/
          retention-days: 14
      - name: Teardown stack
        if: always()
        working-directory: ${{ github.workspace }}
        run: docker compose -f docker-compose.ci.yml down -v
