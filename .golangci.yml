version: "2"

# Fase 16: habilitado v2.11.4 (Go 1.26 support). Scope mínimo:
# govet + ineffassign + staticcheck com checks seletivos.
# Pre-existente (ST1005 error capitalization, QF* suggestions,
# S10xx stylistic) silenciado para evitar cleanup massivo aqui —
# sweep gradual em Fase 17+.
# errcheck / revive pendentes (>38 warnings precisam fix gradual).
# SA1019 whatsmeow/proto deprecation é upstream pending.

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - staticcheck
  settings:
    staticcheck:
      checks:
        - "all"
        - "-ST1000"
        - "-ST1003"
        - "-ST1005"
        - "-ST1020"
        - "-ST1021"
        - "-ST1022"
        - "-SA1012"
        - "-SA1019"
        - "-SA9003"
        - "-QF1003"
        - "-QF1007"
        - "-QF1008"
        - "-S1025"
        - "-S1039"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
