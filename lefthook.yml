# lefthook.yml — hooks canonicos Laura Finance.
# Instalacao: brew install lefthook && lefthook install

pre-commit:
  parallel: true
  commands:
    gitleaks:
      run: gitleaks protect --staged --redact --no-banner
    golangci-lint:
      glob: "laura-go/**/*.go"
      run: cd laura-go && golangci-lint run --new-from-rev=HEAD~1 --timeout=2m {staged_files}
    eslint:
      glob: "laura-pwa/**/*.{ts,tsx,js,jsx}"
      run: cd laura-pwa && npx eslint --fix {staged_files}

pre-push:
  commands:
    go-test-short:
      run: cd laura-go && go test -short ./...

commit-msg:
  commands:
    validate-scope:
      run: |
        MSG=$(cat {1})
        SCOPE_PATTERN='^(feat|fix|chore|docs|test|build|refactor|ci|perf|lint|security|style|hooks)\([a-z-]+\):'
        if ! echo "$MSG" | grep -qE "$SCOPE_PATTERN"; then
          echo "⚠ commit-msg scope inválido. Formato: type(scope): descrição"
          echo "Valid types: feat|fix|chore|docs|test|build|refactor|ci|perf|lint|security|style|hooks"
          exit 1
        fi
