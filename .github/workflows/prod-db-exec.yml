name: Prod DB Exec (wipe+seed admin)

# Executa o SQL infrastructure/scripts/wipe-and-seed-admin.sql dentro
# do container postgres da stack laura-finance via Portainer Docker API.
#
# Uso: Actions → Prod DB Exec → Run workflow → master.
#
# Pré-requisitos: stack laura-finance rodando com postgres service up.
# O workflow faz:
#   1. Descobre o container postgres via /containers/json.
#   2. Cria exec `sh -c 'echo <b64> | base64 -d | psql -U laura -d laura_finance -v ON_ERROR_STOP=1'`.
#   3. Inicia o exec (detach=false) e captura a saída.
#   4. Inspeciona exit code via /exec/{id}/json; falha o job se != 0.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Digite CONFIRMO para executar o wipe+seed em produção'
        required: true
        default: ''
      sql_file:
        description: 'SQL a executar (default: recovery-and-seed.sql)'
        required: false
        default: 'infrastructure/scripts/recovery-and-seed.sql'

jobs:
  exec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Confirmação obrigatória
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "CONFIRMO" ]; then
            echo "::error::Você precisa digitar CONFIRMO no input. Abortado."
            exit 1
          fi

      - name: Descobrir container postgres
        id: find
        env:
          PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
          PORTAINER_API_KEY: ${{ secrets.PORTAINER_API_KEY }}
          PORTAINER_ENDPOINT_ID: ${{ secrets.PORTAINER_ENDPOINT_ID }}
        run: |
          set -euo pipefail
          CID=$(curl -sSf -H "X-API-Key: $PORTAINER_API_KEY" \
            "$PORTAINER_URL/api/endpoints/$PORTAINER_ENDPOINT_ID/docker/containers/json?all=1" \
            | jq -r '.[] | select(.Names[] | test("laura-finance.*postgres|laura_finance.*postgres|postgres.*laura")) | .Id' \
            | head -n1)
          if [ -z "$CID" ] || [ "$CID" = "null" ]; then
            echo "::error::postgres container não encontrado"
            exit 1
          fi
          echo "CONTAINER_ID=$CID" >> "$GITHUB_ENV"
          echo "Encontrado container postgres: $CID"

      - name: Executar wipe+seed SQL
        env:
          PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
          PORTAINER_API_KEY: ${{ secrets.PORTAINER_API_KEY }}
          PORTAINER_ENDPOINT_ID: ${{ secrets.PORTAINER_ENDPOINT_ID }}
        run: |
          set -euo pipefail
          SQL_FILE="${{ github.event.inputs.sql_file }}"
          SQL_FILE="${SQL_FILE:-infrastructure/scripts/recovery-and-seed.sql}"
          echo "Usando SQL: $SQL_FILE"
          SQL_B64=$(base64 -w0 < "$SQL_FILE")
          CMD="echo $SQL_B64 | base64 -d | psql -U laura -d laura_finance -v ON_ERROR_STOP=1"

          EXEC_BODY=$(jq -nc --arg c "$CMD" '{
            AttachStdin: false,
            AttachStdout: true,
            AttachStderr: true,
            Tty: false,
            Cmd: ["sh","-c",$c]
          }')

          EXEC_ID=$(curl -sSf -X POST \
            -H "X-API-Key: $PORTAINER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$EXEC_BODY" \
            "$PORTAINER_URL/api/endpoints/$PORTAINER_ENDPOINT_ID/docker/containers/$CONTAINER_ID/exec" \
            | jq -r .Id)

          if [ -z "$EXEC_ID" ] || [ "$EXEC_ID" = "null" ]; then
            echo "::error::Falha ao criar exec"
            exit 1
          fi

          echo "Exec criado: $EXEC_ID"

          # Start exec com detach=false para capturar saída (stdout + stderr framed)
          curl -sSf -X POST \
            -H "X-API-Key: $PORTAINER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"Detach":false,"Tty":false}' \
            "$PORTAINER_URL/api/endpoints/$PORTAINER_ENDPOINT_ID/docker/exec/$EXEC_ID/start" \
            | tee /tmp/exec-output.raw || true

          echo ""
          echo "── Saída (hex header bytes podem aparecer; texto legível abaixo) ──"
          # Remove os headers de 8-byte do docker stream se presentes
          cat /tmp/exec-output.raw | strings | head -100

          # Inspeciona exit code
          EC=$(curl -sSf -H "X-API-Key: $PORTAINER_API_KEY" \
            "$PORTAINER_URL/api/endpoints/$PORTAINER_ENDPOINT_ID/docker/exec/$EXEC_ID/json" \
            | jq -r .ExitCode)

          echo "Exit code: $EC"
          if [ "$EC" != "0" ]; then
            echo "::error::psql falhou (exit $EC)"
            exit 1
          fi

      - name: Smoke — login endpoint alcança o DB
        run: |
          set -euo pipefail
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://laura.nexusai360.com/login")
          echo "GET /login → $STATUS"
          [ "$STATUS" = "200" ] || exit 1
