version: "2"

# Fase 17A — errcheck ativado. Revive ativa no Sprint D.
# Staticcheck mantém supressões temporárias até Sprint E.

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
      exclude-functions:
        - (io.Closer).Close
        - os.Setenv
        - os.Unsetenv
    staticcheck:
      checks:
        - "all"
        - "-ST1000"
        - "-ST1003"
        - "-ST1005"
        - "-ST1020"
        - "-ST1021"
        - "-ST1022"
        - "-SA1012"
        - "-SA1019"
        - "-SA9003"
        - "-QF1003"
        - "-QF1007"
        - "-QF1008"
        - "-S1025"
        - "-S1039"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
