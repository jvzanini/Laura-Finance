name: Go CI

# Fase 16: golangci-lint v2.11.4 reabilitado com .golangci.yml v2
# (govet + ineffassign + staticcheck). Go 1.26 suportado.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  GO_VERSION: "1.26"

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: laura-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: laura-go/go.sum
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.11.4
          working-directory: laura-go
          args: --timeout=5m --config=../.golangci.yml

  vet:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: laura-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: laura-go/go.sum
      - name: go vet
        run: go vet ./...

  security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: laura-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: laura-go/go.sum
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: Run gosec
        # Config canônica em laura-go/.gosec.yml (suprime G706+G101 LOW).
        # G104 zerada na Fase 12 Parte B.
        run: gosec -exclude=G706,G101 ./...
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: laura-go
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: laura
          POSTGRES_PASSWORD: laura_test
          POSTGRES_DB: laura_finance_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U laura -d laura_finance_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://laura:laura_test@localhost:5432/laura_finance_test?sslmode=disable
      SESSION_SECRET: test-secret-not-real-32bytes-padding-x
      GROQ_API_KEY: test-fake-key
      APP_ENV: development
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: laura-go/go.sum
      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U laura; then
              exit 0
            fi
            sleep 2
          done
          echo "Postgres did not become ready in time" >&2
          exit 1
      - name: Apply migrations
        working-directory: ${{ github.workspace }}
        run: |
          shopt -s nullglob
          for f in laura-go/internal/migrations/*.up.sql; do
            echo "Applying $f"
            PGPASSWORD=laura_test psql -h localhost -p 5432 -U laura -d laura_finance_test -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: Run tests with race + coverage
        run: go test -race -coverprofile=coverage.out ./...
      - name: Coverage report
        run: |
          go tool cover -func=coverage.out | tail -5
          pct=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "coverage: $pct%"
          # Gate Fase 15: short-mode (sem integration) baseline ~21%.
          # Com tag integration: 47.5% total (handlers 57.1%, services
          # 53.8%, pluggy 81.8%). Gate de 20% cobre job "test" short-mode.
          # Job test-integration em main valida full coverage.
          awk -v v="$pct" 'BEGIN{if (v+0 < 20.0) exit 1}'
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: go-coverage
          path: laura-go/coverage.out
          retention-days: 14

  test-integration:
    runs-on: ubuntu-latest
    # Roda somente na branch principal para não gastar minutos em PRs;
    # usa testcontainers (Docker-in-Docker) com retry em flakes de rede.
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    defaults:
      run:
        working-directory: laura-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: laura-go/go.sum
      - name: Run integration tests with retry
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: cd laura-go && go test -tags=integration ./...

  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: laura-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: laura-go/go.sum
      - name: Build
        run: go build -o bin/laura ./
