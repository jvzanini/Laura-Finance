name: Go CI

# NOTE: golangci-lint job desabilitado temporariamente —
# golangci-lint v1.64.8 (built with Go 1.24) nao suporta Go 1.26 ainda.
# Reabilitar quando golangci-lint v2.x sair com suporte Go 1.26+.
# Tracking: https://github.com/golangci/golangci-lint/issues

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  GO_VERSION: "1.26"

jobs:
  # lint:
  #   runs-on: ubuntu-latest
  #   defaults:
  #     run:
  #       working-directory: laura-go
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-go@v5
  #       with:
  #         go-version: ${{ env.GO_VERSION }}
  #         cache-dependency-path: laura-go/go.sum
  #     - name: golangci-lint
  #       uses: golangci/golangci-lint-action@v6
  #       with:
  #         version: latest
  #         working-directory: laura-go
  #         args: --timeout=5m

  vet:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: laura-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: laura-go/go.sum
      - name: Copy SQL migrations for embed
        working-directory: ${{ github.workspace }}
        run: cp infrastructure/migrations/*.sql laura-go/internal/migrations/
      - name: go vet
        run: go vet ./...

  security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: laura-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: laura-go/go.sum
      - name: Copy SQL migrations for embed
        working-directory: ${{ github.workspace }}
        run: cp infrastructure/migrations/*.sql laura-go/internal/migrations/
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: Run gosec
        # G706: log injection via taint (LOW, falso positivo no log de boot port).
        # G101: hardcoded credentials (LOW, falso positivo em error_codes.go - codigos sao nomes, nao credenciais).
        # G104 zerada na Fase 12 Parte B.
        run: gosec -exclude=G706,G101 ./...
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: laura-go
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: laura
          POSTGRES_PASSWORD: laura_test
          POSTGRES_DB: laura_finance_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U laura -d laura_finance_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://laura:laura_test@localhost:5432/laura_finance_test?sslmode=disable
      SESSION_SECRET: test-secret-not-real-32bytes-padding-x
      GROQ_API_KEY: test-fake-key
      APP_ENV: development
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: laura-go/go.sum
      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U laura; then
              exit 0
            fi
            sleep 2
          done
          echo "Postgres did not become ready in time" >&2
          exit 1
      - name: Copy SQL migrations for embed
        working-directory: ${{ github.workspace }}
        run: cp infrastructure/migrations/*.sql laura-go/internal/migrations/
      - name: Apply migrations
        working-directory: ${{ github.workspace }}
        run: |
          shopt -s nullglob
          for f in infrastructure/migrations/*.sql; do
            echo "Applying $f"
            PGPASSWORD=laura_test psql -h localhost -p 5432 -U laura -d laura_finance_test -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: Run tests with race + coverage
        run: go test -race -coverprofile=coverage.out ./...
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: go-coverage
          path: laura-go/coverage.out
          retention-days: 14

  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: laura-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: laura-go/go.sum
      - name: Copy SQL migrations for embed
        working-directory: ${{ github.workspace }}
        run: cp infrastructure/migrations/*.sql laura-go/internal/migrations/
      - name: Build
        run: go build -o bin/laura ./
